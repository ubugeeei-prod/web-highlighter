name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 15
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Install pnpm dependencies through Vite+
        run: nix develop --command vp install --frozen-lockfile

      - name: Verify tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(nix develop --command node -p 'require("./package.json").version')"

      - name: Verify and package browser extensions
        run: |
          nix develop --command vp run verify
          nix develop --command vp run package

      - name: Attest release archives with GitHub OIDC
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release/*.zip

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
