name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package:
    name: Verify and package
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Install pnpm dependencies through Vite+
        run: nix develop --command vp install --frozen-lockfile

      - name: Verify tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(nix develop --command node -p 'require("./package.json").version')"

      - name: Verify source and browser extensions
        run: nix develop --command vp run verify

      - name: Package browser extensions
        run: nix develop --command vp run package

      - name: Upload release archives
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-archives
          path: release/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Attest and publish
    needs: package
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 5
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Download verified release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-archives
          path: release

      - name: Attest release archives with GitHub OIDC
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release/*.zip

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
