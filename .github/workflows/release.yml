name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package:
    name: Verify and package
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      commit: ${{ steps.release.outputs.commit }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
          persist-credentials: false

      - name: Resolve and validate release identity
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(node -p 'require("./package.json").version')"
          moon_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' moon.mod)"
          tag="v$version"
          commit="$(git rev-parse HEAD)"

          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$moon_version" = "$version"
          if [[ "$EVENT_NAME" = workflow_dispatch ]]; then
            test "$GITHUB_REF" = refs/heads/main
            test "$commit" = "$(git rev-parse origin/main)"
          else
            test "$GITHUB_REF_TYPE" = tag
            test "$GITHUB_REF_NAME" = "$tag"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists." >&2
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/$tag^{commit}" >/dev/null; then
            test "$(git rev-list -n 1 "$tag")" = "$commit"
          fi

          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Install pnpm dependencies through Vite+
        run: nix develop --command vp install --frozen-lockfile

      - name: Verify source and browser extensions
        run: nix develop --command vp run verify

      - name: Package browser extensions
        run: nix develop --command vp run package

      - name: Upload release archives
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-archives-${{ steps.release.outputs.tag }}
          path: release/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Attest and publish
    needs: package
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 5
    environment:
      name: release
      url: https://github.com/${{ github.repository }}/releases/tag/${{ needs.package.outputs.tag }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Download verified release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-archives-${{ needs.package.outputs.tag }}
          path: release

      - name: Create annotated tag for a CI-initiated release
        if: github.event_name == 'workflow_dispatch'
        env:
          COMMIT: ${{ needs.package.outputs.commit }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.package.outputs.tag }}
        run: |
          set -euo pipefail
          if existing="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq .object.sha 2>/dev/null)"; then
            target="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$existing" --jq .object.sha 2>/dev/null || printf '%s' "$existing")"
            test "$target" = "$COMMIT"
          else
            tag_object="$(gh api --method POST "repos/$GITHUB_REPOSITORY/git/tags" \
              -f tag="$TAG" \
              -f message="$TAG" \
              -f object="$COMMIT" \
              -f type=commit \
              --jq .sha)"
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$TAG" \
              -f sha="$tag_object" >/dev/null
          fi

      - name: Attest release archives with GitHub OIDC
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release/*.zip

      - name: Publish GitHub Release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.package.outputs.tag }}
        run: gh release create "$TAG" release/* --verify-tag --generate-notes --title "$TAG"
