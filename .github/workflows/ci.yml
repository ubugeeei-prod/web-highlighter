name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enforce conventional pull request title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?\!?:\ .+ ]]; then
            echo "Pull request title must use Conventional Commits syntax." >&2
            exit 1
          fi

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Validate pinned environments
        run: nix flake check --all-systems --no-build

      - name: Install pnpm dependencies through Vite+
        run: nix develop --command vp install --frozen-lockfile

      - name: Verify source, tests, distributions, and budgets
        run: nix develop --command vp run verify

      - name: Upload unpacked extensions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-extensions
          path: dist/
          if-no-files-found: error
          retention-days: 14
